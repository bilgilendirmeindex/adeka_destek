
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Adeka İlaç | Adeka Destek Paneli </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', sans-serif; }
        .sidebar { background: white; border-right: 1px solid #dee2e6; min-height: 100vh; position: fixed; width: 220px; padding: 20px; }
        .content { margin-left: 220px; padding: 30px; }
        .card { border: none; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.03); margin-bottom: 20px; }
        .kpi-card { border-left: 4px solid #4e73df; padding: 15px 20px; }
        .upload-zone { background: #fff; padding: 20px; border: 2px dashed #4e73df; border-radius: 12px; text-align: center; margin-bottom: 25px; cursor: pointer; }
        .active-year { background-color: #4e73df !important; color: white !important; }
        .chart-container { min-height: 400px; }
        .type-tag { font-size: 0.75rem; padding: 2px 8px; border-radius: 10px; background: #eef2ff; color: #4338ca; margin-right: 4px; display: inline-block; margin-bottom: 4px; border: 1px solid #d0d7f7; }
        #dashboardContent { display: none; }
    </style>
</head>
<body>

<div class="sidebar shadow-sm">
    <h5 class="text-primary fw-bold mb-4">ADEKA DESTEK</h5>
    <div class="nav flex-column nav-pills"><a class="nav-link active">Dashboard</a></div>
</div>

<div class="content">
    <div class="upload-zone shadow-sm" id="dropZone">
        <h6 class="fw-bold text-primary mb-2">Excel Dosyasını Buraya Sürükleyin veya Seçin</h6>
        <input type="file" id="excelInput" accept=".xlsx, .xls" class="form-control w-50 m-auto">
        <small class="text-muted d-block mt-2">Her ay sonu yeni dosyayı seçerek raporu güncelleyebilirsiniz.</small>
    </div>

    <div id="dashboardContent">
        <div class="card p-3 d-flex flex-row justify-content-between align-items-center shadow-sm mb-4">
            <div><h6 class="mb-0 fw-bold">Dinamik Filtrele</h6><small class="text-muted" id="fileNameDisp"></small></div>
            <div id="btnGroup"></div>
        </div>

        <div class="row g-3 mb-4 text-center">
            <div class="col-md-3"><div class="card kpi-card"><small class="text-muted fw-bold">TOPLAM</small><div id="kpi-total" class="h3 fw-bold mb-0">0</div></div></div>
            <div class="col-md-3"><div class="card kpi-card" style="border-left-color: #1cc88a;"><small class="text-muted fw-bold">ÇÖZÜLEN</small><div id="kpi-resolved" class="h3 fw-bold mb-0">0</div></div></div>
            <div class="col-md-3"><div class="card kpi-card" style="border-left-color: #36b9cc;"><small class="text-muted fw-bold">BAŞARI %</small><div id="kpi-pct" class="h3 fw-bold mb-0">%0</div></div></div>
            <div class="col-md-3"><div class="card kpi-card" style="border-left-color: #f6c23e;"><small class="text-muted fw-bold">AÇIK</small><div id="kpi-open" class="h3 fw-bold mb-0">0</div></div></div>
        </div>

        <div class="row">
            <div class="col-lg-6"><div class="card p-3 shadow-sm"><div id="typeChart" class="chart-container"></div></div></div>
            <div class="col-lg-6"><div class="card p-3 shadow-sm"><div id="techChart" class="chart-container"></div></div></div>
        </div>
        
        <div class="card p-4 shadow-sm">
            <h5 class="fw-bold mb-4 text-primary">Teknisyen & Tür Bazlı Uzmanlık Karnesi</h5>
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-light">
                        <tr>
                            <th>Teknisyen</th>
                            <th class="text-center">Kapatılan</th>
                            <th>Türlere Göre Dağılım</th>
                            <th class="text-center">Başarı Oranı</th>
                        </tr>
                    </thead>
                    <tbody id="techTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    let globalData = [];

    document.getElementById('excelInput').addEventListener('change', handleFile);

    function handleFile(e) {
        const file = e.target.files[0];
        if (!file) return;

        document.getElementById('fileNameDisp').innerText = file.name;
        const reader = new FileReader();
        
        reader.onload = function(e) {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const sheetName = workbook.SheetNames[0];
            const jsonData = XLSX.utils.sheet_to_json(workbook.Sheets[sheetName]);

            // Veriyi Temizle (Null teknisyenleri at)
            globalData = jsonData.filter(d => d.Teknisyeni && String(d.Teknisyeni).toLowerCase() !== 'null');
            
            // Tarih ve Yıl İşleme
            globalData.forEach(d => {
                if(d.Tarih) {
                    let dateObj = isNaN(d.Tarih) ? new Date(d.Tarih) : new Date((d.Tarih - (25567 + 1)) * 86400 * 1000);
                    d.Yıl_Sayısal = dateObj.getFullYear();
                }
            });

            initFilters();
            filterData('Tümü');
            document.getElementById('dashboardContent').style.display = 'block';
        };
        reader.readAsArrayBuffer(file);
    }

    function initFilters() {
        const years = [...new Set(globalData.map(d => d.Yıl_Sayısal))].sort((a,b) => b-a);
        let btns = `<button class="btn btn-outline-primary me-2 filter-btn active-year" onclick="filterData('Tümü', this)">Tümü</button>`;
        years.forEach(y => {
            if(y) btns += `<button class="btn btn-outline-primary me-2 filter-btn" onclick="filterData(${y}, this)">${y}</button>`;
        });
        document.getElementById('btnGroup').innerHTML = btns;
    }

    function filterData(year, btn) {
        if(btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active-year'));
            btn.classList.add('active-year');
        }
        const filtered = year === 'Tümü' ? globalData : globalData.filter(d => d.Yıl_Sayısal == year);
        updateDashboard(filtered);
    }

    function updateDashboard(data) {
        const total = data.length;
        const resolvedData = data.filter(d => d.Durumu === 'Çözüldü' || d.Durumu === 'Kapalı');
        const resolvedCount = resolvedData.length;
        const pct = total > 0 ? ((resolvedCount / total) * 100).toFixed(1) : 0;

        document.getElementById('kpi-total').innerText = total;
        document.getElementById('kpi-resolved').innerText = resolvedCount;
        document.getElementById('kpi-pct').innerText = '%' + pct;
        document.getElementById('kpi-open').innerText = total - resolvedCount;

        // Grafikler ve Tablo Mantığı (Öncekiyle Aynı)
        const typeCounts = {};
        data.forEach(d => typeCounts[d.İstek_Grubu] = (typeCounts[d.İstek_Grubu] || 0) + 1);
        Plotly.newPlot('typeChart', [{ values: Object.values(typeCounts), labels: Object.keys(typeCounts), type: 'pie', hole: 0.5 }], {title: 'Talep Dağılımı'});

        const techPieCounts = {};
        resolvedData.forEach(d => techPieCounts[d.Teknisyeni] = (techPieCounts[d.Teknisyeni] || 0) + 1);
        Plotly.newPlot('techChart', [{ values: Object.values(techPieCounts), labels: Object.keys(techPieCounts), type: 'pie', hole: 0.6 }], {title: 'Çözüm Payı (%)'});

        const techStats = {};
        data.forEach(d => {
            const name = d.Teknisyeni;
            if(!techStats[name]) techStats[name] = { total: 0, solved: 0, types: {} };
            techStats[name].total += 1;
            if(d.Durumu === 'Çözüldü' || d.Durumu === 'Kapalı') {
                techStats[name].solved += 1;
                const type = d.İstek_Grubu || "Diğer";
                techStats[name].types[type] = (techStats[name].types[type] || 0) + 1;
            }
        });

        let tableHtml = "";
        Object.keys(techStats).sort().forEach(n => {
            const s = techStats[n];
            let tags = "";
            Object.keys(s.types).forEach(t => tags += `<span class="type-tag">${t}: ${s.types[t]}</span>`);
            tableHtml += `<tr><td>${n}</td><td class="text-center">${s.solved}</td><td>${tags}</td><td class="text-center"><span class="badge bg-primary">%${((s.solved/s.total)*100).toFixed(1)}</span></td></tr>`;
        });
        document.getElementById('techTableBody').innerHTML = tableHtml;
    }
</script>
</body>
</html>
